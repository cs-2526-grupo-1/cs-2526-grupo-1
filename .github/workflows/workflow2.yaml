name: Unit + E2E Testing on PR

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "ANALISIS_DE_CALIDAD.md"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  unit-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run Unit Tests
        run: mvn test -Dtest=es.codeurjc.unit.**.*

      - name: Run E2E Tests
        run: mvn test -Dtest=es.codeurjc.e2e.**.*
