name: Build and Deploy on Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "ANALISIS_DE_CALIDAD.md"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          mvn spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME}}/banking-app:${{ env.VERSION }}

          docker tag \
          ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ env.VERSION }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:latest

      - name: Launch Application in Background
        run: |
          docker run -d --name banking-app-container -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ env.VERSION }}

      - name: Wait for Application to be Ready
        run: |
          timeout 60s bash -c '
            until [[ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login)" == "200" ]] || [[ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login)" == "302" ]]; do
              echo "App not ready yet, retrying in 2 seconds..."
              sleep 2
            done
          '

      - name: Run Smoke Test
        run: |
          mvn test -Dtest=es.codeurjc.e2e.SmokeTest -Dapp.url=http://localhost:8080

      - name: Stop and Remove Container
        if: always()
        run: |
          docker stop banking-app-container || true
          docker rm banking-app-container || true

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ env.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # TODO(azure): deploy on azure and run smoke tests
